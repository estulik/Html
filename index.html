<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprachcafé Mahjong Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 40px; background-color: #f9f9f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background-color: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.1); border-radius: 10px; }
        h1 { color: #c62828; text-align: center; border-bottom: 3px solid #c62828; padding-bottom: 15px; }
        h2 { color: #283593; margin-top: 30px; padding-left: 15px; border-left: 5px solid #283593; }
        .score-box { border: 2px solid #283593; padding: 20px; margin: 25px 0; border-radius: 8px; background-color: #f0f2f6; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background-color: #283593; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .admin-panel { background: #eee; padding: 15px; border-radius: 5px; margin-top: 10px; display: none; }
        input, select { padding: 8px; margin: 5px 0; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; background: #283593; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #1a237e; }
        .rule-box { border: 2px solid #4caf50; padding: 20px; margin: 25px 0; border-radius: 8px; background-color: #e8f5e9; }
        #join-section, #admin-section { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Sprachcafé Style Mahjong</h1>

        <div class="score-box">
            <h2>🀄 Live Leaderboard</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Punkte</th>
                        <th>Kommentar</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="3">Fetching data...</td></tr>
                </tbody>
            </table>

            <div id="auth-section">
                <input type="password" id="passcode" placeholder="Enter Passcode">
                <button onclick="checkAccess()">Unlock Controls</button>
            </div>

            <div id="admin-panel" class="admin-panel">
                <div id="join-section" style="border-bottom: 1px solid #ccc; padding-bottom: 15px;">
                    <h4>New Player</h4>
                    <input type="text" id="reg-name" placeholder="Name">
                    <input type="text" id="reg-comm" placeholder="Kommentar (Optional)">
                    <button onclick="registerPlayer()">Add Player</button>
                </div>

                <div id="admin-section" style="padding-top: 15px;">
                    <h4>Update Stats (Admin Only)</h4>
                    <select id="player-select"></select>
                    <input type="number" id="point-change" placeholder="+/- Punkte">
                    <input type="text" id="comm-update" placeholder="New Kommentar">
                    <button onclick="updateStats()">Save Changes</button>
                </div>
                
                <button onclick="location.reload()" style="background:#666; font-size: 11px;">Lock & Logout</button>
            </div>
        </div>

        <h2>Introduction</h2>
        <p>Sprachcafé Style Mahjong rules continue below...</p>
        <div class="rule-box">
            <p><strong>Win (Hu):</strong> Highest priority. Declare "Hu!" immediately.</p>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://afkzqrlhxldlewbdcskh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFma3pxcmxoeGxkbGV3YmRjc2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDE1NDMsImV4cCI6MjA5MzAxNzU0M30.epc8Tdti3OXmYD-FCAk2Wuo0hTAU0auowkBUGq-qpgM'; // Use the 'anon' public key!
        
        const JOIN_PASS = "2026";
        const ADMIN_PASS = "bluesky";
        // ---------------------

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchScores() {
            const { data, error } = await supabase
                .from('Mahjong')
                .select('*')
                .order('Punkte', { ascending: false });

            if (error) {
                console.error("Fetch error:", error);
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="3" style="color:red">Error: ${error.message}</td></tr>`;
                return;
            }
            
            const tbody = document.getElementById('leaderboard-body');
            const select = document.getElementById('player-select');
            tbody.innerHTML = '';
            select.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No players found.</td></tr>';
            }

            data.forEach(player => {
                tbody.innerHTML += `
                    <tr>
                        <td>${player.Name}</td>
                        <td><b>${(player.Punkte || 0).toLocaleString()}</b></td>
                        <td><i>${player.Kommentar || ''}</i></td>
                    </tr>`;
                select.innerHTML += `<option value="${player.Name}">${player.Name}</option>`;
            });
        }

        function checkAccess() {
            const pw = document.getElementById('passcode').value;
            const panel = document.getElementById('admin-panel');
            const joinSec = document.getElementById('join-section');
            const adminSec = document.getElementById('admin-section');

            if (pw === ADMIN_PASS) {
                panel.style.display = 'block';
                joinSec.style.display = 'block';
                adminSec.style.display = 'block';
                document.getElementById('auth-section').style.display = 'none';
            } else if (pw === JOIN_PASS) {
                panel.style.display = 'block';
                joinSec.style.display = 'block';
                adminSec.style.display = 'none';
                document.getElementById('auth-section').style.display = 'none';
            } else { 
                alert("Wrong passcode!"); 
            }
        }

        async function registerPlayer() {
            const name = document.getElementById('reg-name').value.trim();
            const comm = document.getElementById('reg-comm').value.trim();
            if (!name) return alert("Name is required");

            const { error } = await supabase
                .from('Mahjong')
                .insert([{ Name: name, Punkte: 25000, Kommentar: comm }]);

            if (error) alert("Insert Error: " + error.message);
            else {
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-comm').value = '';
                fetchScores();
            }
        }

        async function updateStats() {
            const name = document.getElementById('player-select').value;
            const pChange = parseInt(document.getElementById('point-change').value) || 0;
            const newComm = document.getElementById('comm-update').value.trim();

            let { data, error: fetchError } = await supabase
                .from('Mahjong')
                .select('Punkte')
                .eq('Name', name)
                .single();
            
            if (fetchError) return alert(fetchError.message);

            let updates = { Punkte: (data.Punkte || 0) + pChange };
            if (newComm !== "") updates.Kommentar = newComm;

            const { error: updateError } = await supabase
                .from('Mahjong')
                .update(updates)
                .eq('Name', name);

            if (updateError) alert("Update Error: " + updateError.message);
            else {
                document.getElementById('point-change').value = '';
                document.getElementById('comm-update').value = '';
                fetchScores();
            }
        }

        // Initialize table
        fetchScores();
    </script>
</body>
</html>
