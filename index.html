<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprachcafé Mahjong Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 40px; background-color: #f9f9f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background-color: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.1); border-radius: 10px; }
        h1 { color: #c62828; text-align: center; border-bottom: 3px solid #c62828; padding-bottom: 15px; }
        h2 { color: #283593; margin-top: 30px; padding-left: 15px; border-left: 5px solid #283593; }
        .score-box { border: 2px solid #283593; padding: 20px; margin: 25px 0; border-radius: 8px; background-color: #f0f2f6; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background-color: #283593; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .admin-panel { background: #eee; padding: 15px; border-radius: 5px; margin-top: 10px; display: none; }
        input, select { padding: 8px; margin: 5px 0; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; background: #283593; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #1a237e; }
        .rule-box { border: 2px solid #4caf50; padding: 20px; margin: 25px 0; border-radius: 8px; background-color: #e8f5e9; }
        #join-section, #admin-section { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Sprachcafé Style Mahjong</h1>

        <div class="score-box">
            <h2>🀄 Live Leaderboard</h2>
            <table>
                <thead>
                    <tr><th>Name</th><th>Punkte</th><th>Kommentar</th></tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>

            <div id="auth-section">
                <input type="password" id="passcode" placeholder="Enter Passcode">
                <button onclick="checkAccess()">Unlock Controls</button>
            </div>

            <div id="admin-panel" class="admin-panel">
                <div id="join-section" style="border-bottom: 1px solid #ccc; padding-bottom: 15px;">
                    <h4>New Player</h4>
                    <input type="text" id="reg-name" placeholder="Name">
                    <input type="text" id="reg-comm" placeholder="Initial Kommentar">
                    <button onclick="registerPlayer()">Add Player</button>
                </div>

                <div id="admin-section" style="padding-top: 15px;">
                    <h4>Update Stats</h4>
                    <select id="player-select"></select>
                    <input type="number" id="point-change" placeholder="+/- Punkte">
                    <input type="text" id="comm-update" placeholder="New Kommentar">
                    <button onclick="updateStats()">Save Changes</button>
                    <hr>
                    <h4 style="color:red">Delete Player</h4>
                    <select id="del-select"></select>
                    <button onclick="deletePlayer()" style="background:red">Delete</button>
                </div>
                <button onclick="location.reload()">Lock</button>
            </div>
        </div>

        <h2>Rules</h2>
        <div class="rule-box">
            <p><strong>Win (Hu):</strong> 4 sets and 1 pair. Declare "Hu!" to win.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://afkzqrlhxldlewbdcskh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFma3pxcmxoeGxkbGV3YmRjc2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDE1NDMsImV4cCI6MjA5MzAxNzU0M30.epc8Tdti3OXmYD-FCAk2Wuo0hTAU0auowkBUGq-qpgM';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchScores() {
            const { data } = await db.from('Mahjong').select('*').order('Punkte', { ascending: false });
            const tbody = document.getElementById('leaderboard-body');
            const sel = document.getElementById('player-select');
            const dSel = document.getElementById('del-select');
            
            tbody.innerHTML = ''; sel.innerHTML = ''; dSel.innerHTML = '';
            data.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.Name}</td><td><b>${(p.Punkte || 0).toLocaleString()}</b></td><td>${p.Kommentar || ''}</td></tr>`;
                const opt = `<option value="${p.Name}">${p.Name}</option>`;
                sel.innerHTML += opt; dSel.innerHTML += opt;
            });
        }

        function checkAccess() {
            const pw = document.getElementById('passcode').value;
            if (pw === "bluesky") {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('join-section').style.display = 'block';
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('auth-section').style.display = 'none';
            } else if (pw === "2026") {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('join-section').style.display = 'block';
                document.getElementById('auth-section').style.display = 'none';
            } else { alert("Wrong!"); }
        }

        async function registerPlayer() {
            const n = document.getElementById('reg-name').value;
            const c = document.getElementById('reg-comm').value;
            await db.from('Mahjong').insert([{ Name: n, Punkte: 25000, Kommentar: c }]);
            location.reload();
        }

        async function updateStats() {
            const n = document.getElementById('player-select').value;
            const p = parseInt(document.getElementById('point-change').value) || 0;
            const c = document.getElementById('comm-update').value;
            let { data } = await db.from('Mahjong').select('Punkte').eq('Name', n).single();
            await db.from('Mahjong').update({ Punkte: data.Punkte + p, Kommentar: c }).eq('Name', n);
            fetchScores();
        }

        async function deletePlayer() {
            const n = document.getElementById('del-select').value;
            if (confirm("Delete " + n + "?")) {
                await db.from('Mahjong').delete().eq('Name', n);
                fetchScores();
            }
        }

        fetchScores();
    </script>
</body>
</html>
